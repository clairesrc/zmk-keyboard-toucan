# Dongle-screen display options. These reference symbols defined by the
# zmk-dongle-screen module, whose pinned branch (claude/enhance-wpm-meter-y9Hrb)
# was deleted upstream. They only affect the dongle build (dongle_screen shield)
# and are irrelevant to the left/right halves, so they are commented out here
# to build the keyboard halves. Restore them (with a valid module revision) for
# a dongle build.
#CONFIG_DONGLE_SCREEN_HORIZONTAL=y
#CONFIG_DONGLE_SCREEN_FLIPPED=n
#CONFIG_DONGLE_SCREEN_AMBIENT_LIGHT=y
#CONFIG_DONGLE_SCREEN_IDLE_TIMEOUT_S=1800
#CONFIG_DONGLE_SCREEN_MAX_BRIGHTNESS=70
#CONFIG_DONGLE_SCREEN_MIN_BRIGHTNESS=10
#CONFIG_DONGLE_SCREEN_DEFAULT_BRIGHTNESS=30
#CONFIG_DONGLE_SCREEN_BRIGHTNESS_KEYBOARD_CONTROL=y
#CONFIG_DONGLE_SCREEN_BRIGHTNESS_UP_KEYCODE=115
#CONFIG_DONGLE_SCREEN_BRIGHTNESS_DOWN_KEYCODE=114
#CONFIG_DONGLE_SCREEN_BRIGHTNESS_STEP=5
